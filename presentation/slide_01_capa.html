<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papelaria Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@800&family=Manrope:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: linear-gradient(180deg, #0B0D12 0%, #12161D 50%, #0B0D12 100%);
            display: grid;
            place-items: center;
            position: relative;
            overflow: hidden;
        }

        .slide-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' result='noise' /%3E%3C/filter%3E%3Crect width='400' height='400' fill='%230b0d12' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            background-size: 400px 400px;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 900px;
            padding: 0 40px;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-family: "Bodoni Moda", serif;
            font-size: 5.6rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #FFFFFF;
            margin-bottom: 1.2rem;
            line-height: 1.1;
        }

        .accent-line {
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
            margin: 1.8rem auto 2rem;
            border-radius: 2px;
        }

        .subtitle {
            font-family: "Manrope", sans-serif;
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.02em;
            color: #A0AAB2;
            opacity: 0.85;
            line-height: 1.8;
            margin-bottom: 3rem;
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 2.2rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(212, 175, 55, 0.05));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #D4AF37;
            font-family: "Manrope", sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 320ms cubic-bezier(0.22, 1, 0.36, 1);
            text-decoration: none;
        }

        .cta-button:hover {
            border-color: rgba(212, 175, 55, 0.6);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
            box-shadow: 0 16px 48px rgba(212, 175, 55, 0.12);
            transform: translateY(-2px);
        }

        .footer-text {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            text-align: center;
            font-family: "Manrope", sans-serif;
            font-size: 0.8rem;
            color: rgba(160, 170, 178, 0.4);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .decorative-element {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 1px solid rgba(212, 175, 55, 0.08);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            opacity: 0.5;
        }

        .decorative-element-2 {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 1px solid rgba(212, 175, 55, 0.08);
            border-radius: 50%;
            bottom: -80px;
            left: -80px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="decorative-element"></div>
        <div class="decorative-element-2"></div>

        <div class="content">
            <h1 class="title">Papelaria Premium</h1>
            <div class="accent-line"></div>
            <p class="subtitle">Design Editorial Sofisticado para Marcas que Exigem Presença</p>
            <a href="#" class="cta-button">Explorar Site</a>
        </div>

        <div class="footer-text">Apresentação Institucional 2024</div>
    </div>
</body>
</html>
